Summary: Personal organizer and digital library
Description: |-
  solyto is a personal organizer and digital library. Manage your links, books,
  movies, music, games, recipes, notes, todos, contacts, finances, and more in
  one place.

  The app connects to a solyto server — either the hosted service at solyto.app,
  or your own self-hosted instance if you prefer to keep your data on
  infrastructure you control.

RepoType: git
Repo: https://github.com/solyto/mobile

Builds:
  - versionName: 1.0.12
    versionCode: 10012
    commit: v1.0.12
    subdir: android/app
    sudo:
      - curl -Lo node.tar.gz 
        https://nodejs.org/dist/v22.23.1/node-v22.23.1-linux-x64.tar.gz
      - echo "7a8cb04b4a1df4eaf432125324b81b29a088e73570a23259a8de1c65d07fc129  
        node.tar.gz" | sha256sum -c -
      - tar xzf node.tar.gz --strip-components=1 -C /usr/local/
    gradle:
      - yes
    prebuild: bash ../../scripts/build-fdroid.sh

